<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>The Basel Problem - Thumbnail</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=EB+Garamond:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1280px;
    height: 720px;
    overflow: hidden;
    font-family: 'EB Garamond', 'Playfair Display', serif;
    background: #1a1a2e;
    position: relative;
  }

  /* Chalkboard texture */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(30, 55, 50, 0.6) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(25, 40, 55, 0.5) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(35, 35, 60, 1) 0%, rgba(18, 18, 32, 1) 100%);
    z-index: 0;
  }

  /* Chalk dust effect */
  body::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.015) 0px, transparent 1px),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.02) 0px, transparent 1px),
      radial-gradient(circle at 60% 70%, rgba(255,255,255,0.015) 0px, transparent 1px),
      radial-gradient(circle at 35% 85%, rgba(255,255,255,0.01) 0px, transparent 1px),
      radial-gradient(circle at 90% 60%, rgba(255,255,255,0.02) 0px, transparent 1px);
    background-size: 3px 3px, 5px 4px, 4px 5px, 6px 3px, 3px 6px;
    z-index: 1;
    pointer-events: none;
  }

  .container {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-right: 300px;
    padding-bottom: 30px;
  }

  /* Euler portrait */
  .euler-portrait {
    position: absolute;
    right: 50px;
    top: 50%;
    transform: translateY(-50%);
    width: 270px;
    height: 360px;
    border-radius: 12px;
    opacity: 0.25;
    z-index: 0;
    background: url('https://upload.wikimedia.org/wikipedia/commons/6/60/Leonhard_Euler_2.jpg') center/cover no-repeat;
    filter: grayscale(1) brightness(1.2);
  }

  /* === FORMULA === */
  .formula-row {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    position: relative;
  }

  .formula {
    display: flex;
    align-items: center;
    gap: 6px;
    color: #f0e6d3;
    text-shadow:
      0 0 30px rgba(240, 230, 211, 0.3),
      0 0 60px rgba(240, 230, 211, 0.1);
  }

  .term {
    font-family: 'Libre Baskerville', 'EB Garamond', serif;
    font-size: 78px;
    font-weight: 400;
    letter-spacing: 1px;
  }

  .fraction {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    vertical-align: middle;
    position: relative;
    margin: 0 2px;
  }

  .frac-num, .frac-den {
    font-family: 'Libre Baskerville', 'EB Garamond', serif;
    font-size: 60px;
    font-weight: 400;
    line-height: 1.05;
    text-align: center;
    padding: 0 6px;
  }

  .frac-line {
    width: 100%;
    height: 2px;
    background: #f0e6d3;
    box-shadow: 0 0 8px rgba(240, 230, 211, 0.3);
  }

  .plus {
    font-family: 'Libre Baskerville', serif;
    font-size: 64px;
    font-weight: 400;
    color: #f0e6d3;
    margin: 0 8px;
    opacity: 0.9;
  }

  .dots {
    font-family: 'Libre Baskerville', serif;
    font-size: 64px;
    font-weight: 400;
    color: #f0e6d3;
    margin: 0 10px;
    letter-spacing: 4px;
    opacity: 0.85;
  }

  .equals {
    font-family: 'Libre Baskerville', serif;
    font-size: 72px;
    font-weight: 400;
    color: #e8c170;
    margin: 0 20px;
    text-shadow: 0 0 20px rgba(232, 193, 112, 0.4);
  }

  /* Result - pi^2/6 */
  .result {
    display: inline-flex;
    align-items: center;
    position: relative;
  }

  .result .frac-num, .result .frac-den {
    font-size: 68px;
    color: #e8c170;
    text-shadow: 0 0 20px rgba(232, 193, 112, 0.3);
  }

  .result .frac-line {
    background: #e8c170;
    box-shadow: 0 0 10px rgba(232, 193, 112, 0.4);
  }

  .pi {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
  }

  .superscript {
    font-size: 40px;
    vertical-align: super;
    line-height: 0;
    position: relative;
    top: -8px;
  }

  /* Decorative chalk line under formula */
  .chalk-underline {
    width: 900px;
    height: 3px;
    margin: 18px auto 0;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(240, 230, 211, 0.08) 10%,
      rgba(240, 230, 211, 0.15) 30%,
      rgba(240, 230, 211, 0.2) 50%,
      rgba(240, 230, 211, 0.15) 70%,
      rgba(240, 230, 211, 0.08) 90%,
      transparent 100%
    );
    border-radius: 2px;
  }

  /* === TITLE === */
  .title-section {
    text-align: center;
    margin-top: 40px;
  }

  .title-main {
    font-family: 'Playfair Display', serif;
    font-size: 82px;
    font-weight: 900;
    color: #f0e6d3;
    letter-spacing: 3px;
    text-shadow:
      0 2px 4px rgba(0, 0, 0, 0.5),
      0 0 40px rgba(240, 230, 211, 0.15);
    text-transform: uppercase;
  }

  .title-the {
    font-family: 'Cormorant Garamond', serif;
    font-size: 36px;
    font-weight: 300;
    color: rgba(240, 230, 211, 0.6);
    letter-spacing: 14px;
    text-transform: uppercase;
    margin-bottom: -8px;
    display: block;
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 300;
    font-style: italic;
    color: #e8c170;
    letter-spacing: 5px;
    margin-top: 8px;
    text-shadow: 0 0 20px rgba(232, 193, 112, 0.2);
  }

  /* Decorative corner brackets */
  .bracket {
    position: absolute;
    width: 50px;
    height: 50px;
    z-index: 3;
  }
  .bracket-tl {
    top: 30px; left: 30px;
    border-top: 3px solid rgba(232, 193, 112, 0.6);
    border-left: 3px solid rgba(232, 193, 112, 0.6);
  }
  .bracket-tr {
    top: 30px; right: 30px;
    border-top: 3px solid rgba(232, 193, 112, 0.6);
    border-right: 3px solid rgba(232, 193, 112, 0.6);
  }
  .bracket-bl {
    bottom: 30px; left: 30px;
    border-bottom: 3px solid rgba(232, 193, 112, 0.6);
    border-left: 3px solid rgba(232, 193, 112, 0.6);
  }
  .bracket-br {
    bottom: 30px; right: 30px;
    border-bottom: 3px solid rgba(232, 193, 112, 0.6);
    border-right: 3px solid rgba(232, 193, 112, 0.6);
  }

  /* Year badge */
  .year-badge {
    position: absolute;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    font-weight: 300;
    color: rgba(240, 230, 211, 0.3);
    letter-spacing: 8px;
  }

</style>
</head>
<body>

<!-- Corner brackets -->
<div class="bracket bracket-tl"></div>
<div class="bracket bracket-tr"></div>
<div class="bracket bracket-bl"></div>
<div class="bracket bracket-br"></div>

<!-- Year -->
<div class="year-badge">ANNO 1735</div>


<!-- Euler portrait placeholder -->
<div class="euler-portrait" title="Euler portrait placeholder"></div>

<div class="container">
  <!-- FORMULA -->
  <div class="formula-row">
    <div class="formula">
      <span class="term">1</span>
      <span class="plus">+</span>
      <span class="fraction">
        <span class="frac-num">1</span>
        <span class="frac-line"></span>
        <span class="frac-den">4</span>
      </span>
      <span class="plus">+</span>
      <span class="fraction">
        <span class="frac-num">1</span>
        <span class="frac-line"></span>
        <span class="frac-den">9</span>
      </span>
      <span class="plus">+</span>
      <span class="fraction">
        <span class="frac-num">1</span>
        <span class="frac-line"></span>
        <span class="frac-den">16</span>
      </span>
      <span class="plus">+</span>
      <span class="fraction">
        <span class="frac-num">1</span>
        <span class="frac-line"></span>
        <span class="frac-den">25</span>
      </span>
      <span class="plus">+</span>
      <span class="dots">&middot;&middot;&middot;</span>
      <span class="equals">=</span>
      <span class="result">
        <span class="fraction">
          <span class="frac-num"><span class="pi">&pi;</span><span class="superscript">2</span></span>
          <span class="frac-line"></span>
          <span class="frac-den">6</span>
        </span>
      </span>
    </div>
  </div>
  <div class="chalk-underline"></div>

  <!-- TITLE -->
  <div class="title-section">
    <span class="title-the">The</span>
    <div class="title-main">Basel Problem</div>
    <div class="subtitle">Euler's Proof</div>
  </div>
</div>

</body>
</html>
