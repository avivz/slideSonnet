<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SlideSonnet Logo</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .title-main {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2px;
    background: linear-gradient(135deg, #e2e8f0 0%, #f8fafc 40%, #38bdf8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .title-sub {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 20px;
    color: #c4b5fd;
    letter-spacing: 6px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="title-main">SlideSonnet</div>
  <div class="title-sub">Text &#8594; Video</div>
</body>
</html>
